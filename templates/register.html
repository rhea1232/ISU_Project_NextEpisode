{% extends "base.html" %}
{% block title %}Register – Next Episode{% endblock %}
{% block content %}
<div class="row justify-content-center" style="margin-top:8vh;">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <div style="background:var(--blue); width:64px; height:64px; border-radius:16px;
                  display:inline-flex; align-items:center; justify-content:center;
                  font-size:1.8rem; color:#fff; margin-bottom:1rem; box-shadow:0 4px 16px rgba(99,102,241,.3);">
        <i class="bi bi-tv-fill"></i>
      </div>
      <h1 style="font-size:1.9rem; font-weight:800; color:var(--text);">Next Episode</h1>
    </div>

    <div class="auth-card">
      <h5 class="mb-1" style="font-weight:700; color:var(--text);">Create your account</h5>
      <p class="text-muted mb-4" style="font-size:.85rem;">Start tracking your shows today.</p>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">USERNAME</label>
          <input type="text" name="username" class="form-control" placeholder="Pick a username" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">PASSWORD</label>
          <input type="password" name="password" class="form-control" placeholder="At least 4 characters" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">
          Create Account <i class="bi bi-arrow-right ms-1"></i>
        </button>
      </form>
    </div>

    <p class="text-center mt-3" style="font-size:.88rem; color:var(--muted);">
      Already have an account? <a href="{{ url_for('login') }}" style="font-weight:600;">Log in</a>
    </p>
  </div>
</div>
{% endblock %}
