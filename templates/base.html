<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Next Episode{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #f3f0ff;
      --surface:   #ffffff;
      --card:      #ffffff;
      --border:    #e0d9f7;
      --blue:      #6366f1;
      --blue-light:#eef2ff;
      --blue-mid:  #a5b4fc;
      --text:      #1e1b4b;
      --muted:     #6b7280;
      --green:     #16a34a;
      --green-bg:  #f0fdf4;
      --red:       #dc2626;
      --yellow:    #f59e0b;
      --shadow:    0 1px 4px rgba(99,102,241,.08), 0 2px 12px rgba(99,102,241,.07);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      letter-spacing: -.3px;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--blue) !important;
      padding: .7rem 0;
      box-shadow: 0 2px 8px rgba(99,102,241,.3);
    }
    .navbar-brand {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff !important;
      letter-spacing: -.3px;
    }
    .navbar-brand i { opacity: .9; }
    .nav-link-btn {
      color: rgba(255,255,255,.85);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      padding: .4rem .9rem;
      border-radius: 8px;
      transition: background .15s;
    }
    .nav-link-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
    .nav-link-btn.active { background: rgba(255,255,255,.2); color: #fff; }
    .nav-username {
      color: rgba(255,255,255,.75);
      font-size: .82rem;
      padding: .3rem .8rem;
      background: rgba(255,255,255,.12);
      border-radius: 20px;
    }
    .btn-nav-logout {
      color: rgba(255,255,255,.8);
      border: 1px solid rgba(255,255,255,.3);
      background: transparent;
      font-size: .82rem;
      padding: .3rem .9rem;
      border-radius: 8px;
    }
    .btn-nav-logout:hover { background: rgba(255,255,255,.15); color: #fff; }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--blue);
      border-color: var(--blue);
      font-weight: 600;
      border-radius: 8px;
    }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .btn-outline-primary { border-color: var(--blue); color: var(--blue); border-radius: 8px; }
    .btn-outline-primary:hover { background: var(--blue); color: #fff; }
    .btn-filter {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      border-radius: 20px;
      font-size: .82rem;
      padding: .3rem .9rem;
      font-weight: 500;
      transition: all .15s;
    }
    .btn-filter:hover { border-color: var(--blue); color: var(--blue); }
    .btn-filter.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 600; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .show-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      box-shadow: var(--shadow);
      transition: border-color .2s, box-shadow .2s;
    }
    .show-row:hover {
      border-color: var(--blue-mid);
      box-shadow: 0 2px 16px rgba(99,102,241,.12);
    }

    /* ── Stat cards ── */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1rem;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-number { font-size: 2.2rem; font-weight: 800; line-height: 1; color: var(--blue); }

    /* ── Forms ── */
    .form-control, .form-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      background: var(--surface);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(99,102,241,.12);
    }
    .form-label { font-size: .82rem; font-weight: 600; color: var(--muted); letter-spacing: .4px; }

    /* ── Progress ── */
    .progress { background: #e2e8f0; border-radius: 99px; height: 7px; }
    .progress-bar { background: var(--blue); border-radius: 99px; }
    .progress-bar.complete { background: var(--green); }

    /* ── Badges ── */
    .badge-status {
      font-size: .7rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; letter-spacing: .3px;
    }
    .badge-watching  { background: #eff6ff; color: var(--blue); border: 1px solid #bfdbfe; }
    .badge-completed { background: var(--green-bg); color: var(--green); border: 1px solid #bbf7d0; }
    .badge-watchlist { background: #f8fafc; color: var(--muted); border: 1px solid var(--border); }

    /* ── Poster ── */
    .show-poster {
      width: 52px; height: 74px;
      object-fit: cover; border-radius: 6px; flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .poster-placeholder {
      width: 52px; height: 74px;
      background: var(--blue-light);
      border-radius: 6px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--blue-mid); font-size: 1.4rem;
      border: 1px solid var(--border);
    }

    /* ── Stars ── */
    .star-filled { color: var(--yellow); }
    .star-empty  { color: #cbd5e1; }

    /* ── Alerts ── */
    .alert { border-radius: 10px; font-size: .9rem; }
    .alert-success { background: var(--green-bg); border-color: #bbf7d0; color: var(--green); }
    .alert-danger  { background: #fef2f2; border-color: #fecaca; color: var(--red); }
    .alert-warning { background: #fffbeb; border-color: #fde68a; color: #92400e; }
    .alert-info    { background: #eff6ff; border-color: #bfdbfe; color: var(--blue); }

    /* ── Auth pages ── */
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 24px rgba(99,102,241,.1);
    }

    /* ── Category pill selector ── */
    .pill-label {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      cursor: pointer;
      font-size: .88rem;
      font-weight: 500;
      transition: all .15s;
      background: var(--surface);
      color: var(--muted);
      user-select: none;
    }
    .pill-label:hover { border-color: var(--blue); color: var(--blue); }
    input[type="radio"]:checked + .pill-label {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
      font-weight: 700;
    }

    /* ── Misc ── */
    .text-muted { color: var(--muted) !important; }
    a { color: var(--blue); }
    a:hover { color: #1d4ed8; }
    .section-label {
      font-size: .72rem; font-weight: 700;
      letter-spacing: .8px; color: var(--muted);
      text-transform: uppercase; margin-bottom: .5rem;
    }
    hr { border-color: var(--border); }
  </style>
</head>
<body>

{% if session.user_id %}
<nav class="navbar navbar-expand-lg">
  <div class="container" style="max-width:980px;">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">
      <i class="bi bi-tv-fill me-2"></i>Next Episode
    </a>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <a href="{{ url_for('dashboard') }}" class="nav-link-btn {% if request.endpoint == 'dashboard' %}active{% endif %}">
        <i class="bi bi-grid me-1"></i>My List
      </a>
      <a href="{{ url_for('search') }}" class="nav-link-btn {% if request.endpoint == 'search' or request.endpoint == 'show_detail' %}active{% endif %}">
        <i class="bi bi-search me-1"></i>Search
      </a>
      <a href="{{ url_for('profile') }}" class="nav-link-btn {% if request.endpoint == 'profile' %}active{% endif %}">
        <i class="bi bi-person me-1"></i>Profile
      </a>
      <span class="nav-username ms-1"><i class="bi bi-person-fill me-1"></i>{{ session.username }}</span>
      <button onclick="location.href='{{ url_for('logout') }}'" class="btn btn-nav-logout">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </div>
  </div>
</nav>
{% endif %}

<div class="container py-4" style="max-width:980px;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
